<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 하루 로그북</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f7f6f3; color: #1a1a1a; min-height: 100vh; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e0ddd6; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .day-label { font-size: 13px; color: #888; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e5de; padding: 1.5rem; margin-bottom: 1rem; }
  .field { margin-bottom: 1.25rem; }
  .field:last-child { margin-bottom: 0; }
  label.field-label { display: block; font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  input[type="date"] { width: 200px; padding: 8px 12px; font-size: 15px; border: 1px solid #e0ddd6; border-radius: 8px; background: #faf9f7; color: #1a1a1a; font-family: inherit; }
  textarea { width: 100%; padding: 10px 12px; font-size: 15px; border: 1px solid #e0ddd6; border-radius: 8px; background: #faf9f7; color: #1a1a1a; font-family: inherit; resize: vertical; line-height: 1.7; }
  input[type="date"]:focus, textarea:focus { outline: none; border-color: #aaa; background: #fff; }
  .health-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .health-item { display: flex; align-items: center; gap: 7px; padding: 9px 10px; border: 1px solid #e0ddd6; border-radius: 8px; background: #faf9f7; cursor: pointer; transition: all 0.15s; user-select: none; }
  .health-item:hover { background: #f0ede6; }
  .health-item.checked { background: #eef4ff; border-color: #b3caf5; }
  .health-item input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #3a7bd5; flex-shrink: 0; }
  .health-item span { font-size: 13px; color: #444; }
  .health-item.checked span { color: #2c5fb3; font-weight: 600; }
  .divider { border: none; border-top: 1px solid #e8e5de; margin: 1.25rem 0; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }
  button { padding: 10px 22px; font-size: 14px; font-family: inherit; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .btn-reset { background: #fff; color: #666; border: 1px solid #ddd; }
  .btn-reset:hover { background: #f5f3ef; }
  .btn-save { background: #1a1a1a; color: #fff; border: 1px solid #1a1a1a; }
  .btn-save:hover { background: #333; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 11px 22px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .section-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #888; margin-bottom: 12px; }
  @media (max-width: 480px) {
    .health-grid { grid-template-columns: repeat(2, 1fr); }
    input[type="date"] { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>나의 하루 로그북</h1>
    <span class="day-label" id="dayLabel"></span>
  </div>

  <div class="card">
    <div class="field">
      <label class="field-label">일자</label>
      <input type="date" id="dateField" />
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label class="field-label">주요 활동</label>
      <textarea id="activity" rows="5" placeholder="오늘 한 일, 미팅, 작업 등 활동을 기록하세요..."></textarea>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label class="field-label">메모</label>
      <textarea id="memo" rows="4" placeholder="아이디어, 통찰, 떠오른 생각 등을 자유롭게..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="section-tag">건강관리</div>
    <div class="health-grid" id="healthGrid"></div>
  </div>

  <div class="card">
    <div class="field">
      <label class="field-label">성찰</label>
      <textarea id="reflection" rows="4" placeholder="오늘 하루를 돌아보며..."></textarea>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label class="field-label">내일 할 일</label>
      <textarea id="tomorrow" rows="4" placeholder="내일 해야 할 일, 준비할 것들..."></textarea>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-reset" onclick="clearForm()">초기화</button>
    <button class="btn-save" onclick="saveEntry()">구글 시트에 저장</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const healthItems = ['수영','자전거','골프','산책','헬스','음주','복약'];
const checks = {};
const healthGrid = document.getElementById('healthGrid');

healthItems.forEach(item => {
  checks[item] = false;
  const div = document.createElement('div');
  div.className = 'health-item';
  div.id = 'hi_' + item;
  const cbId = 'cb_' + item;
  div.innerHTML = `<input type="checkbox" id="${cbId}"><span>${item}</span>`;
  const cb = div.querySelector('input');
  cb.addEventListener('change', e => {
    checks[item] = e.target.checked;
    div.classList.toggle('checked', e.target.checked);
  });
  div.addEventListener('click', e => {
    if (e.target.tagName !== 'INPUT') {
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event('change'));
    }
  });
  healthGrid.appendChild(div);
});

function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}

function getDayLabel(dateStr) {
  const days = ['일','월','화','수','목','금','토'];
  const d = new Date(dateStr + 'T00:00:00');
  return `${dateStr} (${days[d.getDay()]}요일)`;
}

const dateField = document.getElementById('dateField');
dateField.value = getTodayStr();
document.getElementById('dayLabel').textContent = getDayLabel(getTodayStr());
dateField.addEventListener('change', () => {
  document.getElementById('dayLabel').textContent = getDayLabel(dateField.value);
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function clearForm() {
  dateField.value = getTodayStr();
  document.getElementById('dayLabel').textContent = getDayLabel(getTodayStr());
  document.getElementById('activity').value = '';
  document.getElementById('memo').value = '';
  document.getElementById('reflection').value = '';
  document.getElementById('tomorrow').value = '';
  healthItems.forEach(item => {
    checks[item] = false;
    const cb = document.getElementById('cb_' + item);
    if (cb) cb.checked = false;
    const div = document.getElementById('hi_' + item);
    if (div) div.classList.remove('checked');
  });
  showToast('초기화되었습니다');
}

// ★ Apps Script URL을 아래에 붙여넣으세요
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzMB3XaJ1hhM2OubOV5N_PU9izm36nrKbT5gg8HThNdX18H7IDPCG1qggzTiVJgitms/exec';

async function saveEntry() {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    showToast('⚠ Apps Script URL을 먼저 설정해주세요');
    return;
  }
  const data = {
    date: dateField.value,
    activity: document.getElementById('activity').value,
    memo: document.getElementById('memo').value,
    health: healthItems.filter(i => checks[i]).join(', '),
    reflection: document.getElementById('reflection').value,
    tomorrow: document.getElementById('tomorrow').value
  };
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    showToast('✓ 저장되었습니다');
    clearForm();
  } catch (e) {
    showToast('저장 실패 — 연결을 확인해주세요');
  }
}
</script>
</body>
</html>
