<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 하루 로그북</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f7f6f3; color: #1a1a1a; min-height: 100vh; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e0ddd6; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .day-label { font-size: 13px; color: #888; }
  .view-badge { display: none; font-size: 11px; font-weight: 600; color: #fff; background: #3a7bd5; padding: 3px 10px; border-radius: 20px; }
  .view-badge.show { display: inline-block; }
  .autosave-label { font-size: 11px; color: #aaa; }
  .month-total { font-size: 11px; color: #3a7bd5; font-weight: 600; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e5de; padding: 1.5rem; margin-bottom: 1rem; }
  .field { margin-bottom: 1.25rem; }
  .field:last-child { margin-bottom: 0; }
  label.field-label { display: block; font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  input[type="date"] { width: 200px; padding: 8px 12px; font-size: 15px; border: 1px solid #e0ddd6; border-radius: 8px; background: #faf9f7; color: #1a1a1a; font-family: inherit; }
  textarea { width: 100%; padding: 10px 12px; font-size: 15px; border: 1px solid #e0ddd6; border-radius: 8px; background: #faf9f7; color: #1a1a1a; font-family: inherit; resize: vertical; line-height: 1.7; }
  input[type="date"]:focus, textarea:focus { outline: none; border-color: #aaa; background: #fff; }
  textarea.readonly, input.readonly { background: #f0ede8; color: #555; resize: none; overflow-y: auto; }
  .health-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .health-item { display: flex; align-items: center; gap: 7px; padding: 9px 10px; border: 1px solid #e0ddd6; border-radius: 8px; background: #faf9f7; cursor: pointer; transition: all 0.15s; user-select: none; }
  .health-item:hover { background: #f0ede6; }
  .health-item.checked { background: #eef4ff; border-color: #b3caf5; }
  .health-item input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #3a7bd5; flex-shrink: 0; }
  .health-item span { font-size: 13px; color: #444; }
  .health-item.checked span { color: #2c5fb3; font-weight: 600; }
  .divider { border: none; border-top: 1px solid #e8e5de; margin: 1.25rem 0; }
  .btn-row { display: flex; gap: 8px; justify-content: space-between; align-items: center; margin-top: 1.5rem; flex-wrap: wrap; }
  .btn-nav { display: flex; gap: 8px; }
  .btn-actions { display: flex; gap: 8px; }
  button { padding: 10px 18px; font-size: 14px; font-family: inherit; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .btn-reset { background: #fff; color: #666; border: 1px solid #ddd; }
  .btn-reset:hover { background: #f5f3ef; }
  .btn-temp { background: #fff; color: #3a7bd5; border: 1px solid #b3caf5; }
  .btn-temp:hover { background: #eef4ff; }
  .btn-save { background: #1a1a1a; color: #fff; border: 1px solid #1a1a1a; }
  .btn-save:hover { background: #333; }
  .btn-nav-item { background: #fff; color: #444; border: 1px solid #ddd; padding: 10px 14px; }
  .btn-nav-item:hover:not(:disabled) { background: #f5f3ef; }
  .btn-nav-item:disabled { opacity: 0.35; cursor: default; }
  .btn-today { background: #fff; color: #3a7bd5; border: 1px solid #b3caf5; font-size: 13px; padding: 10px 14px; }
  .btn-today:hover { background: #eef4ff; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 11px 22px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .section-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #888; margin-bottom: 12px; }
  .expense-grid { display: grid; grid-template-columns: 50px 120px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
  .expense-label { font-size: 14px; color: #555; font-weight: 600; }
  .expense-amount { padding: 8px 10px; font-size: 14px; border: 1px solid #e0ddd6; border-radius: 8px; background: #faf9f7; color: #1a1a1a; font-family: inherit; text-align: right; width: 100%; }
  .expense-desc { padding: 8px 10px; font-size: 14px; border: 1px solid #e0ddd6; border-radius: 8px; background: #faf9f7; color: #1a1a1a; font-family: inherit; width: 100%; }
  .expense-amount:focus, .expense-desc:focus { outline: none; border-color: #aaa; background: #fff; }
  .expense-amount.readonly, .expense-desc.readonly { background: #f0ede8; color: #555; }
  @media (max-width: 480px) {
    .health-grid { grid-template-columns: repeat(2, 1fr); }
    input[type="date"] { width: 100%; }
    button { padding: 10px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>나의 하루 로그북</h1>
    <div class="header-right">
      <span class="day-label" id="dayLabel"></span>
      <span class="view-badge" id="viewBadge">조회 중</span>
      <span class="autosave-label" id="autosaveLabel"></span>
      <span class="month-total" id="monthTotal"></span>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label class="field-label">일자</label>
      <input type="date" id="dateField" />
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label class="field-label">오늘 할 일</label>
      <textarea id="today_todo" rows="2" placeholder="오늘 할 일 (전날 계획이 자동으로 채워집니다)..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label class="field-label">주요 활동</label>
      <textarea id="activity" rows="5" placeholder="오늘 한 일, 미팅, 작업 등 활동을 기록하세요..."></textarea>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label class="field-label">메모</label>
      <textarea id="memo" rows="4" placeholder="아이디어, 통찰, 떠오른 생각 등을 자유롭게..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="section-tag">건강관리</div>
    <div class="health-grid" id="healthGrid"></div>
  </div>

  <div class="card">
    <div class="section-tag">지출</div>
    <div class="expense-grid">
      <span class="expense-label">현금</span>
      <input type="number" class="expense-amount" id="expCashAmt" placeholder="0" min="0">
      <input type="text" class="expense-desc" id="expCashDesc" placeholder="내역...">
    </div>
    <div class="expense-grid">
      <span class="expense-label">카드</span>
      <input type="number" class="expense-amount" id="expCardAmt" placeholder="0" min="0">
      <input type="text" class="expense-desc" id="expCardDesc" placeholder="내역...">
    </div>
    <div class="expense-grid">
      <span class="expense-label">이체</span>
      <input type="number" class="expense-amount" id="expTransferAmt" placeholder="0" min="0">
      <input type="text" class="expense-desc" id="expTransferDesc" placeholder="내역...">
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label class="field-label">성찰</label>
      <textarea id="reflection" rows="2" placeholder="오늘 하루를 돌아보며..."></textarea>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label class="field-label">내일 할 일</label>
      <textarea id="tomorrow" rows="2" placeholder="내일 해야 할 일, 준비할 것들..."></textarea>
    </div>
  </div>

  <div class="btn-row">
    <div class="btn-nav">
      <button class="btn-nav-item" id="btnBack" onclick="navBack()">◀ 이전</button>
      <button class="btn-nav-item" id="btnNext" onclick="navNext()" disabled>다음 ▶</button>
      <button class="btn-today" id="btnToday" onclick="goToday()" style="display:none;">오늘로</button>
      <button class="btn-temp" id="btnTemp" onclick="tempSave()">임시저장</button>
    </div>
    <div class="btn-actions">
      <button class="btn-save" id="btnSave" onclick="confirmSave()">구글 시트에 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzMB3XaJ1hhM2OubOV5N_PU9izm36nrKbT5gg8HThNdX18H7IDPCG1qggzTiVJgitms/exec';
const STORAGE_KEY = 'logbook_temp';
const healthItems = ['수영','자전거','골프','산책','헬스','음주','복약'];
const checks = {};
let viewMode = false;
let autoSaveTimer = null;
let rows = [];
let rowIdx = -1; // -1 = 오늘 입력화면

// ── 건강관리 체크박스 생성 ──
const healthGrid = document.getElementById('healthGrid');
healthItems.forEach(item => {
  checks[item] = false;
  const div = document.createElement('div');
  div.className = 'health-item';
  div.id = 'hi_' + item;
  div.innerHTML = '<input type="checkbox" id="cb_' + item + '"><span>' + item + '</span>';
  const cb = div.querySelector('input');
  cb.addEventListener('change', function(e) {
    checks[item] = e.target.checked;
    div.classList.toggle('checked', e.target.checked);
    if (!viewMode) scheduleAutoSave();
  });
  div.addEventListener('click', function(e) {
    if (e.target.tagName !== 'INPUT' && !viewMode) {
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event('change'));
    }
  });
  healthGrid.appendChild(div);
});

// 텍스트 입력 시 자동저장 예약
['activity','memo','reflection','tomorrow','today_todo'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', function() {
    if (!viewMode) scheduleAutoSave();
  });
});

// ── 날짜 유틸 ──
function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}
function getDayLabel(dateStr) {
  var days = ['일','월','화','수','목','금','토'];
  var d = new Date(dateStr + 'T00:00:00');
  return dateStr + ' (' + days[d.getDay()] + '요일)';
}

// ── 토스트 ──
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ── 임시저장 ──
function getFormData() {
  return {
    date: document.getElementById('dateField').value,
    today_todo: document.getElementById('today_todo').value,
    activity: document.getElementById('activity').value,
    memo: document.getElementById('memo').value,
    health: healthItems.filter(function(i) { return checks[i]; }),
    reflection: document.getElementById('reflection').value,
    tomorrow: document.getElementById('tomorrow').value,
    expCashAmt: document.getElementById('expCashAmt').value,
    expCashDesc: document.getElementById('expCashDesc').value,
    expCardAmt: document.getElementById('expCardAmt').value,
    expCardDesc: document.getElementById('expCardDesc').value,
    expTransferAmt: document.getElementById('expTransferAmt').value,
    expTransferDesc: document.getElementById('expTransferDesc').value,
    savedAt: new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})
  };
}

function tempSave() {
  var data = getFormData();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  document.getElementById('autosaveLabel').textContent = '임시저장 ' + data.savedAt;
  showToast('임시저장되었습니다');
}

function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(function() {
    if (!viewMode) {
      var data = getFormData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      document.getElementById('autosaveLabel').textContent = '자동저장 ' + data.savedAt;
    }
  }, 3000);
}

function loadTempSave() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    var data = JSON.parse(raw);
    if (data.date !== getTodayStr()) return false;
    fillForm(data, true);
    if (data.savedAt) document.getElementById('autosaveLabel').textContent = '자동저장 ' + data.savedAt;
    return true;
  } catch(e) { return false; }
}

// ── 전날 할 일 자동 로드 ──
async function loadYesterdayTodo() {
  var el = document.getElementById('today_todo');
  if (!el || el.value) return;

  // 1. 먼저 로컬스토리지에서 시도
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      var data = JSON.parse(raw);
      var yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      var yStr = yesterday.toISOString().split('T')[0];
      if (data.date === yStr && data.tomorrow) {
        el.value = data.tomorrow;
        return;
      }
    } catch(e) {}
  }

  // 2. 로컬스토리지에 없으면 구글 시트에서 읽어오기
  try {
    var yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    var yStr = yesterday.toISOString().split('T')[0];
    var res = await fetch(SCRIPT_URL + '?action=getByDate&date=' + yStr);
    var json = await res.json();
    if (json.row && json.row.tomorrow) {
      el.value = json.row.tomorrow;
    }
  } catch(e) {}
}

// ── 폼 채우기 ──
function fillForm(data, isTempData) {
  var dateVal = data.date || getTodayStr();
  document.getElementById('dateField').value = dateVal;
  document.getElementById('dayLabel').textContent = getDayLabel(dateVal);
  document.getElementById('today_todo').value = data.today_todo || '';
  document.getElementById('activity').value = data.activity || '';
  document.getElementById('memo').value = data.memo || '';
  document.getElementById('reflection').value = data.reflection || '';
  document.getElementById('tomorrow').value = data.tomorrow || '';
  document.getElementById('expCashAmt').value = data.expCashAmt || '';
  document.getElementById('expCashDesc').value = data.expCashDesc || '';
  document.getElementById('expCardAmt').value = data.expCardAmt || '';
  document.getElementById('expCardDesc').value = data.expCardDesc || '';
  document.getElementById('expTransferAmt').value = data.expTransferAmt || '';
  document.getElementById('expTransferDesc').value = data.expTransferDesc || '';
  var healthArr = [];
  if (isTempData) {
    healthArr = data.health || [];
  } else {
    healthArr = typeof data.health === 'string'
      ? data.health.split(',').map(function(s) { return s.trim(); })
      : (data.health || []);
  }
  healthItems.forEach(function(item) {
    checks[item] = healthArr.indexOf(item) !== -1;
    var cb = document.getElementById('cb_' + item);
    if (cb) cb.checked = checks[item];
    var div = document.getElementById('hi_' + item);
    if (div) div.classList.toggle('checked', checks[item]);
  });
}

// ── 조회 모드 전환 ──
function setViewMode(on) {
  viewMode = on;
  var fields = ['today_todo','activity','memo','reflection','tomorrow','expCashDesc','expCardDesc','expTransferDesc'];
  fields.forEach(function(id) {
    var el = document.getElementById(id);
    el.readOnly = on;
    if (on) el.classList.add('readonly');
    else el.classList.remove('readonly');
  });
  var df = document.getElementById('dateField');
  df.readOnly = on;
  if (on) df.classList.add('readonly');
  else df.classList.remove('readonly');
  ['expCashAmt','expCardAmt','expTransferAmt'].forEach(function(id) {
    var el = document.getElementById(id);
    el.readOnly = on;
    if (on) el.classList.add('readonly');
    else el.classList.remove('readonly');
  });
  healthItems.forEach(function(item) {
    var div = document.getElementById('hi_' + item);
    if (div) {
      if (on) div.style.pointerEvents = 'none';
      else div.style.pointerEvents = '';
    }
  });
  document.getElementById('viewBadge').classList.toggle('show', on);
  document.getElementById('btnTemp').style.display = on ? 'none' : '';
  document.getElementById('btnSave').style.display = on ? 'none' : '';
  document.getElementById('btnToday').style.display = on ? '' : 'none';
}

// ── 버튼 상태 업데이트 ──
function updateNavBtns() {
  var btnBack = document.getElementById('btnBack');
  var btnNext = document.getElementById('btnNext');
  if (rowIdx === -1) {
    btnBack.disabled = false;
    btnNext.disabled = true;
  } else {
    btnBack.disabled = rowIdx <= 0;
    btnNext.disabled = false;
  }
}

// ── 네비게이션 ──
async function navBack() {
  if (rowIdx === -1) {
    // 오늘 화면에서 이전: 데이터 로드 후 마지막 기록
    if (rows.length === 0) {
      showToast('기록을 불러오는 중...');
      try {
        var res = await fetch(SCRIPT_URL + '?action=getAll');
        var json = await res.json();
        rows = json.rows || [];
      } catch(e) {
        showToast('조회 실패 — 연결을 확인해주세요');
        return;
      }
    }
    if (rows.length === 0) {
      showToast('저장된 기록이 없습니다');
      return;
    }
    rowIdx = rows.length - 1;
  } else if (rowIdx > 0) {
    rowIdx -= 1;
  } else {
    return; // 첫 기록에서 이전 불가
  }
  fillForm(rows[rowIdx], false);
  setViewMode(true);
  updateNavBtns();
}

function navNext() {
  if (rowIdx === -1) return;
  if (rowIdx >= rows.length - 1) {
    goToday();
    return;
  }
  rowIdx += 1;
  fillForm(rows[rowIdx], false);
  setViewMode(true);
  updateNavBtns();
}

function goToday() {
  rowIdx = -1;
  setViewMode(false);
  var loaded = loadTempSave();
  if (!loaded) {
    var today = getTodayStr();
    document.getElementById('dateField').value = today;
    document.getElementById('dayLabel').textContent = getDayLabel(today);
    document.getElementById('today_todo').value = '';
    document.getElementById('activity').value = '';
    document.getElementById('memo').value = '';
    document.getElementById('reflection').value = '';
    document.getElementById('tomorrow').value = '';
    healthItems.forEach(function(item) {
      checks[item] = false;
      var cb = document.getElementById('cb_' + item);
      if (cb) cb.checked = false;
      var div = document.getElementById('hi_' + item);
      if (div) div.classList.remove('checked');
    });
    loadYesterdayTodo();
  }
  document.getElementById('autosaveLabel').textContent = '';
  updateNavBtns();
}

// ── 초기화 버튼 ──
function clearForm() {
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('autosaveLabel').textContent = '';
  var today = getTodayStr();
  document.getElementById('dateField').value = today;
  document.getElementById('dayLabel').textContent = getDayLabel(today);
  document.getElementById('today_todo').value = '';
  document.getElementById('activity').value = '';
  document.getElementById('memo').value = '';
  document.getElementById('reflection').value = '';
  document.getElementById('tomorrow').value = '';
  document.getElementById('expCashAmt').value = '';
  document.getElementById('expCashDesc').value = '';
  document.getElementById('expCardAmt').value = '';
  document.getElementById('expCardDesc').value = '';
  document.getElementById('expTransferAmt').value = '';
  document.getElementById('expTransferDesc').value = '';
  document.getElementById('expCashAmt').readOnly = false;
  document.getElementById('expCardAmt').readOnly = false;
  document.getElementById('expTransferAmt').readOnly = false;
  healthItems.forEach(function(item) {
    checks[item] = false;
    var cb = document.getElementById('cb_' + item);
    if (cb) cb.checked = false;
    var div = document.getElementById('hi_' + item);
    if (div) div.classList.remove('checked');
  });
  showToast('초기화되었습니다');
}

// ── 구글 시트 저장 ──
function confirmSave() {
  if (confirm('구글 시트에 저장하시겠습니까?')) {
    saveEntry();
  }
}

async function saveEntry() {
  var data = {
    date: document.getElementById('dateField').value,
    today_todo: document.getElementById('today_todo').value,
    activity: document.getElementById('activity').value,
    memo: document.getElementById('memo').value,
    health: healthItems.filter(function(i) { return checks[i]; }).join(', '),
    reflection: document.getElementById('reflection').value,
    tomorrow: document.getElementById('tomorrow').value,
    expCashAmt: document.getElementById('expCashAmt').value,
    expCashDesc: document.getElementById('expCashDesc').value,
    expCardAmt: document.getElementById('expCardAmt').value,
    expCardDesc: document.getElementById('expCardDesc').value,
    expTransferAmt: document.getElementById('expTransferAmt').value,
    expTransferDesc: document.getElementById('expTransferDesc').value
  };
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('autosaveLabel').textContent = '';
    showToast('✓ 구글 시트에 저장되었습니다');
    clearForm();
    loadMonthTotal();
  } catch(e) {
    showToast('저장 실패 — 연결을 확인해주세요');
  }
}

// ── 이달 지출 합계 ──
async function loadMonthTotal() {
  var month = getTodayStr().substring(0, 7);
  try {
    var res = await fetch(SCRIPT_URL + '?action=getMonthTotal&month=' + month);
    var json = await res.json();
    var total = json.total || 0;
    var formatted = total.toLocaleString('ko-KR');
    document.getElementById('monthTotal').textContent = '이달 지출: ' + formatted + '원';
  } catch(e) {
    document.getElementById('monthTotal').textContent = '';
  }
}

// ── 날짜 변경 이벤트 ──
var dateField = document.getElementById('dateField');
dateField.addEventListener('change', function() {
  document.getElementById('dayLabel').textContent = getDayLabel(dateField.value);
  if (!viewMode) scheduleAutoSave();
});

// ── 시작 ──
var today = getTodayStr();
dateField.value = today;
document.getElementById('dayLabel').textContent = getDayLabel(today);
var loaded = loadTempSave();
if (loaded) showToast('임시저장된 내용을 불러왔습니다');
loadYesterdayTodo();
updateNavBtns();
loadMonthTotal();
</script>
</body>
